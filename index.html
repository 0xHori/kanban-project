<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #f6f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .header-left h1 {
            margin: 0;
            font-size: 32px;
        }

        .header-left p {
            margin: 6px 0 0;
            color: #6b7280;
        }

        .status-badge {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            color: #374151;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .form-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .form-card h2 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .task-form {
            display: grid;
            grid-template-columns: 1.2fr 2fr auto;
            gap: 12px;
            align-items: start;
        }

        .task-form input,
        .task-form textarea,
        .task-form select,
        .task-form button {
            font: inherit;
        }

        .task-form input,
        .task-form textarea,
        .task-form select {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 14px;
            background: #fff;
            outline: none;
            transition: 0.2s;
        }

        .task-form input:focus,
        .task-form textarea:focus,
        .task-form select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .task-form textarea {
            min-height: 90px;
            resize: vertical;
        }

        .task-form button {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .task-form button:hover {
            background: #4338ca;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            align-items: start;
        }

        .column {
            background: #eef2ff;
            border: 1px solid #dbe4ff;
            border-radius: 20px;
            padding: 14px;
            min-height: 420px;
        }

        .column[data-status="open"] {
            background: #eff6ff;
            border-color: #dbeafe;
        }

        .column[data-status="todo"] {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        .column[data-status="in_progress"] {
            background: #f5f3ff;
            border-color: #ddd6fe;
        }

        .column[data-status="done"] {
            background: #ecfdf5;
            border-color: #bbf7d0;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .column-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }

        .column-count {
            min-width: 28px;
            height: 28px;
            border-radius: 999px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .task:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
        }

        .task.dragging {
            opacity: 0.5;
            transform: rotate(1deg);
        }

        .column.drag-over {
            outline: 2px dashed #6366f1;
            outline-offset: -6px;
        }

        .drop-indicator {
            height: 10px;
            margin: 4px 0;
            border-top: 3px solid #6366f1;
            border-radius: 999px;
            opacity: 0;
            transition: opacity 0.12s ease;
        }

        .drop-indicator.active {
            opacity: 1;
        }

        .task h3 {
            margin: 0 0 8px;
            font-size: 16px;
            line-height: 1.3;
        }

        .task p {
            margin: 0 0 14px;
            color: #4b5563;
            font-size: 14px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task select {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
            outline: none;
        }

        .delete-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: #ef4444;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .edit-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #1d4ed8;
        }

        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .edit-form input,
        .edit-form textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
            outline: none;
            font: inherit;
        }

        .edit-form textarea {
            min-height: 80px;
            resize: vertical;
        }

        .edit-form-actions {
            display: flex;
            gap: 10px;
        }

        .save-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: #16a34a;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #15803d;
        }

        .cancel-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: #6b7280;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .cancel-btn:hover {
            background: #4b5563;
        }

        .empty-state {
            color: #6b7280;
            font-size: 14px;
            padding: 8px 2px;
        }

        .drag-handle {
            cursor: grab;
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 20px;
        }

        .task {
            position: relative;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        @media (max-width: 1100px) {
            .board {
                grid-template-columns: repeat(2, 1fr);
            }

            .task-form {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .board {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 16px;
            }

            .header-left h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>Kanban Board</h1>
                <p>Простой интерфейс для твоих задач</p>
            </div>
            <div class="status-badge" id="api-status">API: проверка...</div>
        </div>

        <div class="form-card">
            <h2>Создать задачу</h2>
            <form id="task-form" class="task-form">
                <input type="text" id="task-name" placeholder="Название задачи" required />
                <textarea id="task-description" placeholder="Описание задачи"></textarea>
                <button type="submit">Создать</button>
            </form>
        </div>

        <div class="board">
            <div class="column" data-status="open">
                <div class="column-header">
                    <h2 class="column-title">Open</h2>
                    <span class="column-count" id="count-open">0</span>
                </div>
                <div class="tasks" id="open"></div>
            </div>

            <div class="column" data-status="todo">
                <div class="column-header">
                    <h2 class="column-title">Todo</h2>
                    <span class="column-count" id="count-todo">0</span>
                </div>
                <div class="tasks" id="todo"></div>
            </div>

            <div class="column" data-status="in_progress">
                <div class="column-header">
                    <h2 class="column-title">In Progress</h2>
                    <span class="column-count" id="count-in_progress">0</span>
                </div>
                <div class="tasks" id="in_progress"></div>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <h2 class="column-title">Done</h2>
                    <span class="column-count" id="count-done">0</span>
                </div>
                <div class="tasks" id="done"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const STATUSES = ["open", "todo", "in_progress", "done"];
        let draggedTask = null;
        let currentDropIndicator = null;

        async function checkHealth() {
            const badge = document.getElementById("api-status");

            try {
                const response = await fetch(`${API_URL}/health`);
                if (!response.ok) throw new Error("Health check failed");

                const data = await response.json();
                badge.textContent = `API: ${data.status}`;
            } catch (error) {
                badge.textContent = "API: offline";
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function clearColumns() {
            STATUSES.forEach((status) => {
                document.getElementById(status).innerHTML = "";
                document.getElementById(`count-${status}`).textContent = "0";
            });
        }

        function renderEmptyStates() {
            STATUSES.forEach((status) => {
                const container = document.getElementById(status);
                if (container.children.length === 0) {
                    container.innerHTML = `<div class="empty-state">Пока нет задач</div>`;
                }
            });
        }

        function setupColumnDnD() {
            const columns = document.querySelectorAll(".column");

            columns.forEach((column) => {
                column.addEventListener("dragover", (event) => {
                    event.preventDefault();
                    column.classList.add("drag-over");

                    if (!draggedTask) return;

                    const tasksContainer = column.querySelector(".tasks");
                    const targetCard = getDropTargetCard(tasksContainer, event.clientY);

                    showDropIndicator(tasksContainer, targetCard);
                });

                column.addEventListener("dragleave", (event) => {
                    if (!column.contains(event.relatedTarget)) {
                        column.classList.remove("drag-over");
                        removeDropIndicator();
                    }
                });

                column.addEventListener("drop", async (event) => {
                    event.preventDefault();
                    column.classList.remove("drag-over");

                    if (!draggedTask) {
                        removeDropIndicator();
                        return;
                    }

                    const tasksContainer = column.querySelector(".tasks");
                    const newStatus = column.dataset.status;
                    const newPosition = calculateNewPosition(tasksContainer, event.clientY);

                    removeDropIndicator();
                    await moveTask(draggedTask.id, newStatus, newPosition);
                });
            });
        }


        function updateCounters(tasks) {
            const counts = {
                open: 0,
                todo: 0,
                in_progress: 0,
                done: 0,
            };

            tasks.forEach((task) => {
                counts[task.status]++;
            });

            STATUSES.forEach((status) => {
                document.getElementById(`count-${status}`).textContent = counts[status];
            });
        }


        function getTaskCardsInColumn(column) {
            return [...column.querySelectorAll(".task")].filter(
                (card) => !card.classList.contains("dragging")
            );
        }

        function calculateNewPosition(column, mouseY) {
            const cards = getTaskCardsInColumn(column);

            if (cards.length === 0) {
                return 100;
            }

            let targetCard = null;

            for (const card of cards) {
                const rect = card.getBoundingClientRect();
                const middleY = rect.top + rect.height / 2;

                if (mouseY < middleY) {
                    targetCard = card;
                    break;
                }
            }

            if (!targetCard) {
                const lastCard = cards[cards.length - 1];
                return Number(lastCard.dataset.position) + 100;
            }

            const targetIndex = cards.indexOf(targetCard);

            if (targetIndex === 0) {
                return Number(targetCard.dataset.position) - 100;
            }

            const prevCard = cards[targetIndex - 1];
            const prevPosition = Number(prevCard.dataset.position);
            const nextPosition = Number(targetCard.dataset.position);

            return Math.floor((prevPosition + nextPosition) / 2);
        }

        function getDropTargetCard(column, mouseY) {
            const cards = getTaskCardsInColumn(column);

            for (const card of cards) {
                const rect = card.getBoundingClientRect();
                const middleY = rect.top + rect.height / 2;

                if (mouseY < middleY) {
                    return card;
                }
            }

            return null;
        }

        function createTaskCard(task) {
            const card = document.createElement("div");
            card.className = "task";
            card.dataset.taskId = task.id;
            card.dataset.position = task.position;

            card.innerHTML = `
  <div class="drag-handle" draggable="true">⠿</div>

  <h3>${escapeHtml(task.task_name)}</h3>
  <p>${task.task_description ? escapeHtml(task.task_description) : "Без описания"}</p>
  <small>
    Создано: ${formatDate(task.created_at)}<br>
    Обновлено: ${formatDate(task.updated_at)}
  </small>

  <div class="task-actions">
    <select data-task-id="${task.id}">
      <option value="open" ${task.status === "open" ? "selected" : ""}>open</option>
      <option value="todo" ${task.status === "todo" ? "selected" : ""}>todo</option>
      <option value="in_progress" ${task.status === "in_progress" ? "selected" : ""}>in_progress</option>
      <option value="done" ${task.status === "done" ? "selected" : ""}>done</option>
    </select>

    <button class="edit-btn">Редактировать</button>
    <button class="delete-btn">Удалить</button>
  </div>
`;

            const select = card.querySelector("select");
            select.addEventListener("change", async (event) => {
                await updateTaskStatus(task.id, event.target.value);
            });

            const editBtn = card.querySelector(".edit-btn");
            editBtn.addEventListener("click", () => {
                enableEditMode(card, task);
            });

            const deleteBtn = card.querySelector(".delete-btn");
            deleteBtn.addEventListener("click", async () => {
                await deleteTask(task.id);
            });

            const handle = card.querySelector(".drag-handle");

            handle.addEventListener("dragstart", () => {
                draggedTask = task;
                card.classList.add("dragging");
            });

            handle.addEventListener("dragend", () => {
                draggedTask = null;
                card.classList.remove("dragging");
                removeDropIndicator();
                document.querySelectorAll(".column").forEach((column) => {
                    column.classList.remove("drag-over");
                });
            });

            return card;
        }

        function enableEditMode(card, task) {
            card.innerHTML = `
    <div class="edit-form">
      <input
        id="edit-name-${task.id}"
        type="text"
        value="${escapeHtml(task.task_name)}"
      />
      <textarea id="edit-desc-${task.id}">${task.task_description ? escapeHtml(task.task_description) : ""}</textarea>

      <div class="edit-form-actions">
        <button class="save-btn" type="button">Сохранить</button>
        <button class="cancel-btn" type="button">Отмена</button>
      </div>
    </div>
  `;

            const saveBtn = card.querySelector(".save-btn");
            saveBtn.addEventListener("click", async () => {
                await saveTask(task.id);
            });

            const cancelBtn = card.querySelector(".cancel-btn");
            cancelBtn.addEventListener("click", async () => {
                await loadTasks();
            });
        }

        function removeDropIndicator() {
            if (currentDropIndicator) {
                currentDropIndicator.remove();
                currentDropIndicator = null;
            }
        }

        function showDropIndicator(tasksContainer, targetCard) {
            removeDropIndicator();

            const indicator = document.createElement("div");
            indicator.className = "drop-indicator active";

            if (targetCard) {
                tasksContainer.insertBefore(indicator, targetCard);
            } else {
                tasksContainer.appendChild(indicator);
            }

            currentDropIndicator = indicator;
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                if (!response.ok) throw new Error("Не удалось загрузить задачи");

                const tasks = await response.json();
                tasks.sort((a, b) => {
                    if (a.status === b.status) {
                        return a.position - b.position;
                    }
                    return 0;
                });

                clearColumns();
                updateCounters(tasks);

                tasks.forEach((task) => {
                    const column = document.getElementById(task.status);
                    column.appendChild(createTaskCard(task));
                });

                renderEmptyStates();
            } catch (error) {
                clearColumns();
                STATUSES.forEach((status) => {
                    document.getElementById(status).innerHTML =
                        `<div class="empty-state">Ошибка загрузки</div>`;
                });
            }
        }

        async function createTask(event) {
            event.preventDefault();

            const taskNameInput = document.getElementById("task-name");
            const taskDescriptionInput = document.getElementById("task-description");

            const task_name = taskNameInput.value.trim();
            const task_description = taskDescriptionInput.value.trim();

            if (!task_name) return;

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        task_name,
                        task_description: task_description || null,
                    }),
                });

                if (!response.ok) throw new Error("Не удалось создать задачу");

                document.getElementById("task-form").reset();
                await loadTasks();
            } catch (error) {
                alert("Ошибка при создании задачи");
            }
        }

        async function saveTask(taskId) {
            const nameInput = document.getElementById(`edit-name-${taskId}`);
            const descInput = document.getElementById(`edit-desc-${taskId}`);

            const task_name = nameInput.value.trim();
            const task_description = descInput.value.trim();

            if (!task_name) {
                alert("Название задачи не может быть пустым");
                return;
            }

            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        task_name,
                        task_description: task_description || null,
                    }),
                });

                if (!response.ok) throw new Error("Не удалось сохранить задачу");

                await loadTasks();
            } catch (error) {
                alert("Ошибка при сохранении задачи");
            }
        }

        async function updateTaskStatus(taskId, newStatus) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        status: newStatus,
                    }),
                });

                if (!response.ok) throw new Error("Не удалось обновить задачу");

                await loadTasks();
            } catch (error) {
                alert("Ошибка при обновлении статуса");
            }
        }

        async function moveTask(taskId, newStatus, newPosition) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}/move`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        status: newStatus,
                        position: newPosition,
                    }),
                });

                if (!response.ok) throw new Error("Не удалось переместить задачу");

                await loadTasks();
            } catch (error) {
                alert("Ошибка при перемещении задачи");
            }
        }


        async function deleteTask(taskId) {
            const confirmed = confirm("Удалить задачу?");
            if (!confirmed) return;

            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: "DELETE",
                });

                if (!response.ok) throw new Error("Не удалось удалить задачу");

                await loadTasks();
            } catch (error) {
                alert("Ошибка при удалении задачи");
            }
        }

        function escapeHtml(text) {
            return text
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document
            .getElementById("task-form")
            .addEventListener("submit", createTask);

        setupColumnDnD();
        checkHealth();
        loadTasks();
    </script>
</body>

</html>
